services:
  nginx:
    build:
      context: ./docker/nginx
    ports:
      - "8081:80"
    volumes:
      - ./frontend/dist:/var/www/frontend:ro
      - ./backend/public:/var/www/backend/public:ro
    depends_on:
      - php-fpm
    networks:
      - jutform

  php-fpm:
    build:
      context: ./docker/php
    volumes:
      - ./backend:/var/www/backend
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=jutform
      - DB_USER=jutform
      - DB_PASS=jutform_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - jutform

  mysql:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_secret
      - MYSQL_DATABASE=jutform
      - MYSQL_USER=jutform
      - MYSQL_PASSWORD=jutform_secret
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_secret"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jutform

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - jutform

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - jutform

  adminer:
    image: adminer:latest
    ports:
      - "8082:8080"
    depends_on:
      - mysql
    networks:
      - jutform

volumes:
  mysql_data:

networks:
  jutform:
    driver: bridge
